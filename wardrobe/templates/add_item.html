{% extends "base.html" %}

{% block title %}Add Clothing Item{% endblock %}

{% block content %}
<div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 2rem;">
    <a href="/" style="font-size: 0.7rem; color: #8b7f7a; text-decoration: none; letter-spacing: 2px; text-transform: uppercase;">Dashboard</a>
    <a href="/wardrobe" style="font-size: 0.7rem; color: #8b7f7a; text-decoration: none; letter-spacing: 2px; text-transform: uppercase;">Wardrobe</a>
    <a href="/outfits" style="font-size: 0.7rem; color: #8b7f7a; text-decoration: none; letter-spacing: 2px; text-transform: uppercase;">Outfits</a>
</div>
<div class="card">
    <h2>Add Clothing Item</h2>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="item_name">Item Name</label>
            <input type="text" id="item_name" name="item_name" required>
        </div>

        <div class="form-group">
            <label for="brand">Brand</label>
            <input type="text" id="brand" name="brand" required>
        </div>

        <div class="form-group">
            <label for="size">Size</label>
            <input type="text" id="size" name="size" required>
        </div>

        <div class="form-group">
            <label for="price">Price</label>
            <input type="number" step="0.01" id="price" name="price" required>
        </div>

        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" required>
                <option value="">Select status</option>
                <option value="Active">Active</option>
                <option value="Dirty">Dirty</option>
                <option value="Laundry">Laundry</option>
                <option value="Archived">Archived</option>
                <option value="Donated">Donated</option>
                <option value="Sold">Sold</option>
            </select>
        </div>

        <div class="form-group">
            <label for="subcategory_id">Subcategory</label>
            <select id="subcategory_id" name="subcategory_id" required>
                <option value="">Select subcategory</option>
                {% for s in subcategories %}
                <option value="{{ s.subcategory_ID }}">{{ s.category }} / {{ s.subcategory_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="colour">Colour</label>
            <input type="text" id="colour" name="colour" required>
        </div>

        <div class="form-group">
            <label for="tag">Tag (optional)</label>
            <input type="text" id="tag" name="tag" placeholder="e.g. casual, formal, summer">
        </div>
        
        <div class="form-group">
            <label for="image_url">Image URL (optional)</label>
            <input type="url" id="image_url" name="image_url">
        </div>

        <button type="submit">Add Item</button>
    </form>
</div>
{% endblock %}
