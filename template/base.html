<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Inventory Management{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Inter, sans-serif; background: linear-gradient(135deg, #f8f6f3 0%, #ede7e0 100%); color: #2c2828; min-height: 100vh; font-weight: 300; }
        
        nav { 
            text-align: center; 
            padding: 3rem 0 1rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 100%);
            border-bottom: 1px solid rgba(212,196,176,0.2);
        }
        
        nav h1 { 
            font-family: Cormorant Garamond, serif; 
            font-size: 2.8rem; 
            font-weight: 300; 
            color: #1a1817; 
            letter-spacing: 3px; 
        }
        
        nav p { 
            font-size: 0.75rem; 
            color: #8b7f7a; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin-top: 0.3rem; 
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 1rem;
            padding: 0 20px;
        }
        
        .nav-links > span {
            display: flex;
            align-items: center;
        }
        
        .nav-links a {
            font-size: 0.7rem;
            color: #2c2828;
            text-decoration: none;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 6px 16px;
            border: 1px solid rgba(212,196,176,0.4);
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        
        .nav-links a:hover {
            background: #1a1817;
            color: #f8f6f3;
            border-color: #1a1817;
        }
        
        .divider { 
            width: 50px; 
            height: 1px; 
            background: #d4c4b0; 
            margin: 2rem auto; 
        }
        
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 0 24px 4rem; 
        }
        
        .card { 
            background: rgba(255,255,255,0.6); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(212,196,176,0.3); 
            border-radius: 12px; 
            padding: 3rem 2.5rem; 
            transition: all 0.3s ease; 
        }
        
        .card:hover { 
            background: rgba(255,255,255,0.85); 
        }
        
        h2 { 
            font-family: Cormorant Garamond, serif; 
            font-size: 2rem; 
            font-weight: 400; 
            color: #1a1817; 
            margin-bottom: 2rem; 
            letter-spacing: 1px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            font-size: 0.75rem;
            color: #8b7f7a;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(212,196,176,0.4);
            border-radius: 6px;
            font-family: Inter, sans-serif;
            font-size: 0.9rem;
            color: #2c2828;
            background: rgba(255,255,255,0.7);
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: rgba(212,196,176,0.8);
            background: rgba(255,255,255,0.95);
            box-shadow: 0 0 0 3px rgba(212,196,176,0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #1a1817;
            color: #f8f6f3;
            border: none;
            border-radius: 6px;
            font-family: Inter, sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        
        button:hover {
            background: #3a3837;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26,24,23,0.2);
        }
        
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #c82333;
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .success-message {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #0b5345;
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #8b7f7a;
        }
        
        .form-footer a {
            color: #1a1817;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid #1a1817;
            transition: all 0.3s ease;
        }
        
        .form-footer a:hover {
            opacity: 0.8;
        }
        
        footer { 
            text-align: center; 
            padding: 2rem 0 3rem; 
            font-size: 0.7rem; 
            color: #8b7f7a; 
            letter-spacing: 2px; 
        }
        
        .dropdown-container {
            position: relative;
            display: inline-block;
        }
        
        .dropdown-toggle {
            font-size: 0.7rem;
            color: #2c2828;
            text-decoration: none;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 6px 16px;
            border: 1px solid rgba(212,196,176,0.4);
            border-radius: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
            background: none;
            width: auto;
            margin: 0;
            font-weight: 300;
        }
        
        .dropdown-toggle:hover {
            background: #1a1817;
            color: #f8f6f3;
            border-color: #1a1817;
        }
        
        .dropdown-menu {
            display: none;
            position: absolute;
            background: rgba(255,255,255,0.95);
            min-width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 8px 0;
            border-radius: 8px;
            border: 1px solid rgba(212,196,176,0.3);
            top: 100%;
            right: 0;
            z-index: 1000;
            margin-top: 8px;
        }
        
        .dropdown-menu.active {
            display: block;
        }
        
        .dropdown-menu a, .dropdown-menu button {
            color: #2c2828;
            padding: 10px 20px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: left;
            border: none;
            background: none;
            cursor: pointer;
            font-family: Inter, sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        
        .dropdown-menu a:hover, .dropdown-menu button:hover {
            background: rgba(26,24,23,0.08);
            color: #1a1817;
        }
        
        .dropdown-divider {
            height: 1px;
            background: rgba(212,196,176,0.2);
            margin: 4px 0;
        }
        
        .submenu {
            display: none;
            position: absolute;
            background: rgba(255,255,255,0.95);
            min-width: 180px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 8px 0;
            border-radius: 8px;
            border: 1px solid rgba(212,196,176,0.3);
            left: 100%;
            top: -8px;
            margin-left: 4px;
            z-index: 1001;
        }
        
        .submenu.active {
            display: block;
        }
        
        .submenu a {
            padding: 10px 20px;
            font-size: 0.7rem;
        }
        
        .privacy-item {
            position: relative;
            color: #2c2828;
            padding: 10px 20px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: left;
            border: none;
            background: none;
            cursor: pointer;
            font-family: Inter, sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        
        .privacy-item:hover {
            background: rgba(26,24,23,0.08);
            color: #1a1817;
        }
        
        .privacy-item::after {
            content: '▶';
            position: absolute;
            right: 15px;
            font-size: 0.6rem;
        }
        
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <a href="/" style="text-decoration:none;color:inherit;"><h1>aniwe</h1></a>
        <p>Inventory Management</p>
        {% if session.get('user_id') %}
        <div class="nav-links">
            <span style="font-size: 0.75rem; color: #8b7f7a; letter-spacing: 1.5px;">{{ session.get('first_name') }}</span>
            <div class="dropdown-container">
                <button class="dropdown-toggle" onclick="toggleDropdown(event)">Settings</button>
                <div class="dropdown-menu" id="settingsDropdown">
                    <a href="{{ url_for('orders.update_profile') }}">Update Profile</a>
                    <div class="privacy-item" onclick="toggleSubmenu(event)">
                        PRIVACY
                        <div class="submenu" id="privacySubmenu">
                            <a href="{{ url_for('orders.change_password') }}">Change Password</a>
                            <a href="#" onclick="showDeleteConfirmation(event)">Delete Account</a>
                        </div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a href="{{ url_for('logout') }}">Logout</a>
                </div>
            </div>
        </div>
        {% endif %}
    </nav>
    <div class="divider"></div>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <footer>aniwe &mdash; Inventory Management System</footer>
    
    <script>
        function toggleDropdown(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('settingsDropdown');
            dropdown.classList.toggle('active');
        }
        
        function toggleSubmenu(event) {
            event.stopPropagation();
            const submenu = event.currentTarget.querySelector('.submenu');
            submenu.classList.toggle('active');
        }
        
        function showDeleteConfirmation(event) {
            event.preventDefault();
            if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
                fetch('{{ url_for("orders.delete_account") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('Account deleted successfully.');
                        window.location.href = '{{ url_for("login") }}';
                    } else {
                        alert('Error: ' + (data.message || 'Failed to delete account'));
                    }
                })
                .catch(error => console.error('Error:', error));
            }
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('settingsDropdown');
            const container = document.querySelector('.dropdown-container');
            if (!container.contains(event.target)) {
                dropdown.classList.remove('active');
                const submenu = dropdown.querySelector('.submenu');
                if (submenu) submenu.classList.remove('active');
            }
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
