{% extends "base.html" %}

{% block title %}Change Password - aniwe{% endblock %}

{% block extra_styles %}
<style>
    .header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .header h2 {
        font-family: Cormorant Garamond, serif;
        font-size: 1.8rem;
        font-weight: 400;
        color: #1a1817;
        margin-bottom: 0.5rem;
    }
    
    .card {
        background: rgba(255,255,255,0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(212,196,176,0.3);
        border-radius: 12px;
        padding: 2.5rem;
        margin-bottom: 2rem;
        max-width: 450px;
        margin-left: auto;
        margin-right: auto;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    label {
        display: block;
        font-size: 0.65rem;
        color: #8b7f7a;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 0.5rem;
    }
    
    input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid rgba(212,196,176,0.5);
        border-radius: 8px;
        font-family: Inter, sans-serif;
        font-size: 0.85rem;
        font-weight: 300;
        color: #2c2828;
        background: rgba(255,255,255,0.8);
        outline: none;
        transition: border 0.2s;
    }
    
    input:focus {
        border-color: #d4c4b0;
    }
    
    .btn {
        background: #1a1817;
        color: #f8f6f3;
        padding: 10px 28px;
        border: none;
        border-radius: 50px;
        font-family: Inter, sans-serif;
        font-size: 0.7rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        width: auto;
    }
    
    .btn:hover {
        background: #3a3837;
    }
    
    .error {
        background: #f8d7da;
        color: #842029;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.8rem;
        margin-bottom: 1.5rem;
        border: 1px solid #f5c2c7;
    }
    
    .success {
        background: #d1e7dd;
        color: #0a3622;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.8rem;
        margin-bottom: 1.5rem;
        border: 1px solid #badbcc;
    }
    
    .back-link {
        text-align: center;
        margin-top: 1.5rem;
    }
    
    .back-link a {
        font-size: 0.7rem;
        color: #8b7f7a;
        text-decoration: none;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: color 0.2s;
    }
    
    .back-link a:hover {
        color: #1a1817;
    }
</style>
{% endblock %}

{% block content %}
<div class="header">
    <h2>Change Password</h2>
</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

{% if success %}
<div class="success">{{ success }}</div>
{% endif %}

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="old_password" required>
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" required>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn">Change Password</button>
    </form>
</div>

<div class="back-link">
    <a href="/">← Back to Dashboard</a>
</div>
{% endblock %}
