<!DOCTYPE html>
<html>
<head>
    <title>aniwe — Place Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Inter, sans-serif; background: linear-gradient(135deg, #f8f6f3 0%, #ede7e0 100%); color: #2c2828; min-height: 100vh; font-weight: 300; }
        nav { text-align: center; padding: 3rem 0 1rem; }
        nav h1 { font-family: Cormorant Garamond, serif; font-size: 2.8rem; font-weight: 300; color: #1a1817; letter-spacing: 3px; }
        nav p { font-size: 0.75rem; color: #8b7f7a; letter-spacing: 4px; text-transform: uppercase; margin-top: 0.3rem; }
        .divider { width: 50px; height: 1px; background: #d4c4b0; margin: 2rem auto; }
        .container { max-width: 520px; margin: 0 auto; padding: 0 24px 4rem; }
        .nav-links { display: flex; gap: 12px; justify-content: center; margin-bottom: 2rem; }
        .nav-links a { font-size: 0.7rem; color: #8b7f7a; text-decoration: none; letter-spacing: 2px; text-transform: uppercase; transition: color 0.2s; }
        .nav-links a:hover { color: #1a1817; }
        .card { background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(212,196,176,0.3); border-radius: 12px; padding: 2.5rem; }
        h2 { font-family: Cormorant Garamond, serif; font-size: 1.5rem; font-weight: 400; color: #1a1817; letter-spacing: 1px; margin-bottom: 2rem; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.65rem; color: #8b7f7a; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; }
        select, input { width: 100%; padding: 10px 14px; border: 1px solid rgba(212,196,176,0.5); border-radius: 8px; font-family: Inter, sans-serif; font-size: 0.85rem; font-weight: 300; color: #2c2828; background: rgba(255,255,255,0.8); outline: none; transition: border 0.2s; }
        select:focus, input:focus { border-color: #d4c4b0; }
        .btn { width: 100%; background: #1a1817; color: #f8f6f3; padding: 12px; border: none; border-radius: 50px; font-family: Inter, sans-serif; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; margin-top: 0.5rem; }
        .btn:hover { background: #3a3837; }
        .btn-secondary { display: block; text-align: center; margin-top: 1rem; font-size: 0.7rem; color: #8b7f7a; text-decoration: none; letter-spacing: 1px; }
        .btn-secondary:hover { color: #1a1817; }
        .error { background: #f8d7da; color: #842029; padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 1.5rem; }
        .product-info { background: rgba(212,196,176,0.15); border-radius: 8px; padding: 12px 14px; margin-top: 0.5rem; font-size: 0.8rem; color: #8b7f7a; display: none; }
        footer { text-align: center; padding: 2rem 0 3rem; font-size: 0.7rem; color: #8b7f7a; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav>
        <a href="/" style="text-decoration:none;color:inherit;"><h1>aniwe</h1></a>
        <p>Place Order</p>
    </nav>
    <div class="divider"></div>

    <div class="container">
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/orders">Orders</a>
            <a href="/profile">Profile</a>
        </div>

        <div class="card">
            <h2>New Order</h2>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Select Product</label>
                    <select name="product_id" id="productSelect" onchange="showProductInfo()" required>
                        <option value="">— Choose a product —</option>
                        {% for p in products %}
                        <option value="{{ p.product_ID }}"
                                data-price="{{ p.price }}"
                                data-name="{{ p.name }}">
                            {{ p.name }} — ${{ "%.2f"|format(p.price) }}
                        </option>
                        {% endfor %}
                    </select>
                    <div class="product-info" id="productInfo">
                        <span id="productName"></span> — <strong id="productPrice"></strong>
                    </div>
                </div>

                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="quantity" min="1" value="1" required>
                </div>

                <button type="submit" class="btn">Place Order</button>
                <a href="/orders" class="btn-secondary">← Back to Orders</a>
            </form>
        </div>
    </div>

    <footer>aniwe &mdash; AI-Powered Fashion Stylist</footer>

    <script>
        function showProductInfo() {
            var select = document.getElementById('productSelect');
            var info = document.getElementById('productInfo');
            var option = select.options[select.selectedIndex];
            if (option.value) {
                document.getElementById('productName').textContent = option.dataset.name;
                document.getElementById('productPrice').textContent = '$' + option.dataset.price;
                info.style.display = 'block';
            } else {
                info.style.display = 'none';
            }
        }
    </script>
</body>
</html>
